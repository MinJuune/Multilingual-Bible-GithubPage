<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다국어 성경 - Multilingual Bible</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #ffffff;
            --text-primary: #2a2520;
            --text-secondary: #6b5d52;
            --accent: #8b6f47;
            --accent-light: #c9a876;
            --border: #e5ddd3;
            --shadow: rgba(43, 37, 32, 0.08);
            --ot-color: #7b9e87;
            --nt-color: #6b8cba;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
        }

        header {
            text-align: center;
            padding: 2.5rem 0 1.5rem;
            background: linear-gradient(180deg, #fff 0%, var(--bg-primary) 100%);
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 3.2rem;
            font-weight: 300;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.4rem;
        }

        .app-layout {
            display: flex;
            height: calc(100vh - 110px);
        }

        .sidebar {
            width: 340px;
            min-width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-search {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-search input {
            width: 100%;
            padding: 0.55rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-search input:focus {
            border-color: var(--accent-light);
        }

        .testament-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .testament-tab {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .testament-tab.active-ot {
            color: var(--ot-color);
            border-bottom-color: var(--ot-color);
        }

        .testament-tab.active-nt {
            color: var(--nt-color);
            border-bottom-color: var(--nt-color);
        }

        .books-list {
            overflow-y: auto;
            flex: 1;
            padding: 0.8rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
            gap: 0.55rem;
            align-content: start;
        }

        .book-item {
            padding: 0.7rem 0.45rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            min-height: 76px;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
        }

        .book-item:hover {
            border-color: var(--accent-light);
            background: #f6f0e8;
        }

        .book-item.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .book-item.active .book-item-name,
        .book-item.active .book-item-en,
        .book-item.active .book-badge {
            color: white;
        }

        .book-item-name {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.25;
            word-break: keep-all;
        }

        .book-item-en {
            font-size: 0.68rem;
            color: var(--text-secondary);
            font-family: 'Crimson Pro', serif;
            font-style: italic;
            margin-top: 0.18rem;
            line-height: 1.2;
        }

        .book-badge {
            margin-top: 0.35rem;
            font-size: 0.62rem;
            padding: 0.1rem 0.38rem;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .badge-ot {
            background: #e8f3ec;
            color: var(--ot-color);
        }

        .badge-nt {
            background: #e5edf5;
            color: var(--nt-color);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .chapter-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .chapter-nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .chapter-nav-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--accent);
        }

        .chapter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            width: 100%;
        }

        .chapter-btn {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex: 0 0 auto;
        }

        .chapter-btn:hover {
            border-color: var(--accent-light);
            color: var(--accent);
            background: #f6f0e8;
        }

        .chapter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .verses-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        .verse-block {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 8px var(--shadow);
            transition: box-shadow 0.2s;
        }

        .verse-block:hover {
            box-shadow: 0 4px 16px var(--shadow);
        }

        .verse-number-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .verse-row {
            margin-bottom: 1rem;
            padding-left: 0.8rem;
            border-left: 3px solid transparent;
            transition: border-color 0.2s;
        }

        .verse-row:hover {
            border-left-color: var(--accent-light);
        }

        .verse-row:last-child {
            margin-bottom: 0;
        }

        .lang-label {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-light);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .verse-text-en {
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .verse-text-de {
            font-family: 'Crimson Pro', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .verse-text-zh {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .verse-text-ja {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .verse-text-ko {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .lang-toggles {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-toggle {
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            transition: all 0.2s;
            user-select: none;
        }

        .lang-toggle.on {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 110px);
            }

            .sidebar {
                width: 100%;
                min-width: 0;
                height: auto;
                max-height: 360px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .books-list {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.45rem;
                padding: 0.7rem;
            }

            .book-item {
                min-height: 64px;
                padding: 0.55rem 0.3rem;
                border-radius: 8px;
            }

            .book-item-name {
                font-size: 0.82rem;
            }

            .book-item-en {
                font-size: 0.62rem;
            }

            .chapter-nav {
                padding: 0.9rem 0.8rem 1rem;
            }

            .chapter-nav-title {
                font-size: 1.2rem;
            }

            .chapter-buttons {
                display: flex;
                flex-wrap: wrap;
                gap: 0.3rem;
            }

            .chapter-btn {
                width: 34px;
                height: 34px;
                font-size: 0.78rem;
                border-radius: 6px;
                min-height: unset;
            }

            .lang-toggles {
                width: 100%;
                justify-content: flex-start;
            }

            .verses-area {
                padding: 1rem;
            }

            .verse-block {
                padding: 1.2rem 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 0.78rem;
                line-height: 1.6;
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .books-list {
                grid-template-columns: repeat(3, 1fr);
            }

            .chapter-btn {
                width: 32px;
                height: 32px;
                font-size: 0.76rem;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Bible</h1>
    <div class="subtitle">한국어 (개역개정) &nbsp;•&nbsp; English (NIV) &nbsp;•&nbsp; Deutsch (Luther) &nbsp;•&nbsp; 中文 (和合本) &nbsp;•&nbsp; 日本語 (口語訳)</div>
</header>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="책 이름 검색..." oninput="filterBooks(this.value)">
        </div>

        <div class="testament-tabs">
            <div class="testament-tab active-ot" id="tab-ot" onclick="setTab('OT')">구약 (OT)</div>
            <div class="testament-tab" id="tab-nt" onclick="setTab('NT')">신약 (NT)</div>
        </div>

        <div class="books-list" id="booksList">
            <div class="loading">불러오는 중...</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="chapter-nav" id="chapterNav"></div>
        <div class="verses-area" id="versesArea"></div>
    </main>
</div>

<script>
    let allBooks = [];
    let currentTab = 'OT';
    let currentBook = null;
    let currentChapter = null;
    let activeLangs = { ko: true, en: true, de: true, zh: true, ja: true };

    const KO_NAMES = {
        'Genesis':'창세기','Exodus':'출애굽기','Leviticus':'레위기','Numbers':'민수기',
        'Deuteronomy':'신명기','Joshua':'여호수아','Judges':'사사기','Ruth':'룻기',
        '1 Samuel':'사무엘상','2 Samuel':'사무엘하','1 Kings':'열왕기상','2 Kings':'열왕기하',
        '1 Chronicles':'역대상','2 Chronicles':'역대하','Ezra':'에스라','Nehemiah':'느헤미야',
        'Esther':'에스더','Job':'욥기','Psalms':'시편','Proverbs':'잠언',
        'Ecclesiastes':'전도서','Song of Songs':'아가','Isaiah':'이사야','Jeremiah':'예레미야',
        'Lamentations':'예레미야애가','Ezekiel':'에스겔','Daniel':'다니엘','Hosea':'호세아',
        'Joel':'요엘','Amos':'아모스','Obadiah':'오바댜','Jonah':'요나','Micah':'미가',
        'Nahum':'나훔','Habakkuk':'하박국','Zephaniah':'스바냐','Haggai':'학개',
        'Zechariah':'스가랴','Malachi':'말라기',
        'Matthew':'마태복음','Mark':'마가복음','Luke':'누가복음','John':'요한복음',
        'Acts':'사도행전','Romans':'로마서','1 Corinthians':'고린도전서','2 Corinthians':'고린도후서',
        'Galatians':'갈라디아서','Ephesians':'에베소서','Philippians':'빌립보서','Colossians':'골로새서',
        '1 Thessalonians':'데살로니가전서','2 Thessalonians':'데살로니가후서',
        '1 Timothy':'디모데전서','2 Timothy':'디모데후서','Titus':'디도서','Philemon':'빌레몬서',
        'Hebrews':'히브리서','James':'야고보서','1 Peter':'베드로전서','2 Peter':'베드로후서',
        '1 John':'요한일서','2 John':'요한이서','3 John':'요한삼서','Jude':'유다서',
        'Revelation':'요한계시록'
    };

    function toSafeFileName(name) {
        return name.replace(/[\/\\?%*:|"<>]/g, '_');
    }

    async function init() {
        const res = await fetch('./data-json/books.json');
        allBooks = await res.json();
        renderBooks();
    }

    function filterBooks(query) {
        renderBooks(query);
    }

    function setTab(tab) {
        currentTab = tab;
        document.getElementById('tab-ot').className = 'testament-tab' + (tab === 'OT' ? ' active-ot' : '');
        document.getElementById('tab-nt').className = 'testament-tab' + (tab === 'NT' ? ' active-nt' : '');
        renderBooks(document.getElementById('searchInput').value);
    }

    function renderBooks(query = '') {
        const q = query.toLowerCase();
        const filtered = allBooks.filter(b => {
            if (b.testament !== currentTab) return false;
            if (!q) return true;
            const ko = (KO_NAMES[b.id] || '').toLowerCase();
            return b.id.toLowerCase().includes(q) ||
                   ko.includes(q) ||
                   (b.de || '').toLowerCase().includes(q) ||
                   (b.zh || '').includes(q);
        });

        const container = document.getElementById('booksList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">검색 결과 없음</div>';
            return;
        }

        container.innerHTML = filtered.map(b => {
            const ko = KO_NAMES[b.id] || b.id;
            const isActive = currentBook && currentBook.id === b.id;
            return `
                <button class="book-item ${isActive ? 'active' : ''}" onclick="selectBook('${b.id}')">
                    <div class="book-item-name">${ko}</div>
                    <div class="book-item-en">${b.en}</div>
                    <span class="book-badge badge-${b.testament.toLowerCase()}">${b.testament}</span>
                </button>
            `;
        }).join('');
    }

    async function selectBook(bookId) {
        const book = allBooks.find(b => b.id === bookId);
        if (!book) {
            console.error('Book not found:', bookId);
            return;
        }

        currentBook = book;
        currentChapter = null;
        renderBooks(document.getElementById('searchInput').value);

        const chapterNav = document.getElementById('chapterNav');
        const versesArea = document.getElementById('versesArea');

        chapterNav.innerHTML = `<div class="loading">챕터 불러오는 중...</div>`;
        versesArea.innerHTML = '';

        const safeBook = toSafeFileName(book.id);
        const res = await fetch(`./data-json/chapters/${safeBook}.json`);
        const chapters = await res.json();

        const ko = KO_NAMES[book.id] || book.id;
        const hasJa = !!book.ja;

        chapterNav.innerHTML = `
            <div class="chapter-nav-header">
                <div class="chapter-nav-title">${ko}</div>
                <div class="lang-toggles">
                    <span class="lang-toggle on" id="tog-ko" onclick="toggleLang('ko')">KO</span>
                    <span class="lang-toggle on" id="tog-en" onclick="toggleLang('en')">EN</span>
                    <span class="lang-toggle on" id="tog-de" onclick="toggleLang('de')">DE</span>
                    <span class="lang-toggle on" id="tog-zh" onclick="toggleLang('zh')">ZH</span>
                    <span class="lang-toggle ${hasJa ? 'on' : ''}" id="tog-ja" onclick="toggleLang('ja')" ${!hasJa ? 'title="구약은 일본어 없음"' : ''}>
                        JA${!hasJa ? '<small>*</small>' : ''}
                    </span>
                </div>
            </div>
            <div class="chapter-buttons">
                ${chapters.map(ch =>
                    `<button class="chapter-btn" id="chbtn-${ch}" onclick="loadChapter(${ch})">${ch}</button>`
                ).join('')}
            </div>
        `;

        if (!hasJa) {
            activeLangs.ja = false;
            document.getElementById('tog-ja').classList.remove('on');
        } else {
            activeLangs.ja = true;
        }

        if (chapters.length > 0) {
            loadChapter(chapters[0]);
        }
    }

    async function loadChapter(ch) {
        currentChapter = ch;

        document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
        const btn = document.getElementById(`chbtn-${ch}`);
        if (btn) {
            btn.classList.add('active');
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        const area = document.getElementById('versesArea');
        area.innerHTML = '<div class="loading">구절 불러오는 중...</div>';

        const safeBook = toSafeFileName(currentBook.id);
        const res = await fetch(`./data-json/verses/${safeBook}/${ch}.json`);
        const data = await res.json();

        area.innerHTML = data.verses.map(v => buildVerseHTML(v)).join('');
        area.scrollTop = 0;
    }

    function buildVerseHTML(v) {
        const rows = [];
        if (activeLangs.ko && v.ko) rows.push(`<div class="verse-row"><div class="lang-label">한국어 (개역개정)</div><div class="verse-text-ko">${v.ko}</div></div>`);
        if (activeLangs.en && v.en) rows.push(`<div class="verse-row"><div class="lang-label">English (NIV)</div><div class="verse-text-en">${v.en}</div></div>`);
        if (activeLangs.de && v.de) rows.push(`<div class="verse-row"><div class="lang-label">Deutsch (Luther)</div><div class="verse-text-de">${v.de}</div></div>`);
        if (activeLangs.zh && v.zh) rows.push(`<div class="verse-row"><div class="lang-label">中文 (和合本)</div><div class="verse-text-zh">${v.zh}</div></div>`);
        if (activeLangs.ja && v.ja) rows.push(`<div class="verse-row"><div class="lang-label">日本語 (口語訳)</div><div class="verse-text-ja">${v.ja}</div></div>`);

        return `
            <div class="verse-block">
                <div class="verse-number-badge">${v.number}</div>
                ${rows.join('')}
            </div>
        `;
    }

    function toggleLang(lang) {
        if (lang === 'ja' && currentBook && !currentBook.ja) return;

        activeLangs[lang] = !activeLangs[lang];
        const el = document.getElementById(`tog-${lang}`);
        if (el) {
            el.classList.toggle('on', activeLangs[lang]);
        }

        if (currentChapter) {
            loadChapter(currentChapter);
        }
    }

    init();
</script>
</body>
</html>
